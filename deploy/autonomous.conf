# autonomous.conf — QuantFlowsCorporation/backend, Claude worker, on ms-s1.
# Baked into the image at /opt/autonomous-dev/autonomous.conf (no secrets here;
# the App private key is a runtime mount, the installation is auto-discovered).

# === Target ===
PROJECT_ID="quantflows-backend"
REPO="QuantFlowsCorporation/backend"
REPO_OWNER="QuantFlowsCorporation"
REPO_NAME="backend"
PROJECT_DIR="/work/backend"        # cloned by entrypoint into the work volume
DEFAULT_BRANCH="main"              # agent branches off / PRs into main

# === Worker (Claude Code now; flip to AGENT_CMD=kimi later — adapter is ready) ===
AGENT_CMD="claude"
AGENT_DEV_MODEL=""                 # claude default (opus/sonnet per account)
AGENT_REVIEW_MODEL="sonnet"
AGENT_PERMISSION_MODE="bypassPermissions"   # headless: agent may write/run inside its worktree (sandboxed container)
AGENT_TIMEOUT="2h"                 # tuned down from 4h for a shared box

# === Reviewers ===
# Empty = single Claude reviewer (legacy path, most reliable for first bring-up).
# Add the diverse 2nd reviewer when Kimi is wired: AGENT_REVIEW_AGENTS="claude kimi"
# (a different MODEL decorrelates errors — running two identical Claude sessions
# as the "panel" shares blind spots, which defeats the point).
AGENT_REVIEW_AGENTS=""

# === GitHub auth: App bot (1h installation tokens, not a PAT) ===
GH_AUTH_MODE="app"
DISPATCHER_APP_ID="4048727"
DISPATCHER_APP_PEM="/secrets/app.pem"
DEV_AGENT_APP_ID="4048727"
DEV_AGENT_APP_PEM="/secrets/app.pem"
REVIEW_AGENT_APP_ID="4048727"
REVIEW_AGENT_APP_PEM="/secrets/app.pem"
REAL_GH="/usr/bin/gh"

# === Concurrency / safety (single homelab box) ===
MAX_CONCURRENT=2
MAX_RETRIES=3

# Auto-merge is ON (fully independent): no `no-auto-close` label is applied, so a
# PASS review squash-merges automatically. SAFETY FLOOR: branch protection on main
# requires the verify/{lint,test,typecheck,architecture-gates} checks green, so a
# red or failing PR physically cannot merge regardless of the LLM verdict.
